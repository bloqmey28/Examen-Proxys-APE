name: ape_exam_infrastructure

services:
  # PROXY INVERSO (Único punto de acceso)
  nginx_proxy:
    image: nginx:alpine
    container_name: ape_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apache1
      - apache2
    networks:
      - dmz_network

  # BACKEND 1
  apache1:
    image: httpd:alpine
    container_name: ape_apache_1
    volumes:
      - ./www:/usr/local/apache2/htdocs:ro
    networks:
      - dmz_network
    command: >
      sh -c "echo 'Header always set X-Backend-Server \"apache 1\"' >> /usr/local/apache2/conf/httpd.conf && httpd-foreground"

  # BACKEND 2
  apache2:
    image: httpd:alpine
    container_name: ape_apache_2
    volumes:
      - ./www:/usr/local/apache2/htdocs:ro
    networks:
      - dmz_network
    command: >
      sh -c "echo 'Header always set X-Backend-Server \"apache 2\"' >> /usr/local/apache2/conf/httpd.conf && httpd-foreground"

# RED PERSONALIZADA (Aislamiento)
networks:
  dmz_network:
    driver: bridge

# NOTA: Los backends no tienen mapeo de puertos al host, 
# cumpliendo con el requisito de aislamiento de red.
