worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Configuración del motor de caché (Examen)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=exam_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Formato de log personalizado para ver el estado del caché en la terminal (Examen)
    log_format custom_cache '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            'Cache: $upstream_cache_status';

    access_log /var/log/nginx/access.log custom_cache;

    server_tokens off; # Seguridad: Ocultar versión de Nginx

    # Definición del clúster de backends
    upstream backend_servers {
        server apache1:80;
        server apache2:80;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend_servers;
            
            # Activación del Caché
            proxy_cache exam_cache;
            proxy_cache_valid 200 302 10m;
            add_header X-Cache-Status $upstream_cache_status;

            # Configuración de cabeceras de Proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Cabeceras para identificación de auditoría (Examen)
            proxy_pass_header X-Backend-Server;
            add_header X-LB-Node $upstream_addr always;
            add_header X-LB-Status $upstream_cache_status always;
            
            # Timeout para mayor robustez
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
